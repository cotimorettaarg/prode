<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prode Mundial · Cumple</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FBF7EF;--paper-2:#F3ECDD;--ink:#20211C;--ink-soft:#5C5A4E;
    --pitch:#15793F;--pitch-dark:#0E5A2E;--celeste:#5AAEE0;--sun:#F2A93B;--red:#C9462C;
    --line:#D9D0BC;--shadow:0 1px 0 #fff inset, 0 2px 8px rgba(32,33,28,.08);--radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--paper);color:var(--ink);font-family:"Outfit",system-ui,sans-serif}
  body{min-height:100vh;background-image:radial-gradient(circle at 1px 1px, rgba(32,33,28,.05) 1px, transparent 0);background-size:18px 18px}
  .wrap{max-width:680px;margin:0 auto;padding:0 16px 80px}

  header.top{background:var(--pitch);background-image:linear-gradient(180deg,var(--pitch),var(--pitch-dark));color:#fff;border-radius:0 0 22px 22px;padding:22px 20px 24px;margin:0 -16px 18px;position:relative;overflow:hidden;box-shadow:0 6px 20px rgba(14,90,46,.25)}
  header.top::after{content:"";position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent 0 46px,rgba(255,255,255,.04) 46px 92px);pointer-events:none}
  .eyebrow{font-size:12px;letter-spacing:.22em;text-transform:uppercase;font-weight:700;opacity:.85}
  h1{font-family:"Anton",sans-serif;font-size:clamp(34px,9vw,52px);line-height:.92;text-transform:uppercase;margin:4px 0 8px}
  h1 .ball{color:var(--sun)}
  .subtitle{font-size:13px;font-weight:600;opacity:.9}

  .id-card{background:#fff;border:2px solid var(--line);border-radius:16px;padding:14px;margin-bottom:14px;box-shadow:var(--shadow)}
  .me{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .me label{font-weight:700;font-size:14px;color:var(--ink-soft)}
  .me input{flex:1;min-width:160px;border:2px solid var(--line);background:var(--paper);border-radius:10px;padding:11px 13px;font-family:inherit;font-size:16px;font-weight:600;color:var(--ink)}
  .me input:focus{outline:none;border-color:var(--celeste);background:#fff}
  .grp-toggle{display:flex;gap:8px;align-items:center;margin-top:12px;flex-wrap:wrap}
  .grp-toggle .gl{font-weight:700;font-size:14px;color:var(--ink-soft)}
  .gbtn{flex:1;min-width:120px;border:2px solid var(--line);background:var(--paper);border-radius:10px;padding:10px;font-family:inherit;font-weight:800;font-size:14px;color:var(--ink-soft);cursor:pointer;transition:.15s}
  .gbtn[aria-pressed="true"][data-g="familia"]{background:var(--celeste);border-color:var(--celeste);color:#fff}
  .gbtn[aria-pressed="true"][data-g="amigos"]{background:var(--sun);border-color:var(--sun);color:#3a2a08}

  .orgbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:10px}
  .syncpill{font-size:11px;font-weight:700;color:var(--ink-soft);display:flex;align-items:center;gap:6px}
  .syncdot{width:8px;height:8px;border-radius:50%;background:var(--ink-soft)}
  .syncdot.ok{background:var(--pitch)} .syncdot.err{background:var(--red)}
  .orgbtn{background:none;border:none;font-family:inherit;font-size:12.5px;font-weight:700;color:var(--ink-soft);cursor:pointer;padding:4px 6px;opacity:.75;transition:.15s}
  .orgbtn:hover{opacity:1;color:var(--pitch)} .orgbtn.on{color:var(--pitch);opacity:1}

  .tabs{display:flex;gap:6px;background:var(--paper-2);padding:5px;border-radius:12px;margin-bottom:18px}
  .tab{flex:1;border:none;background:transparent;padding:10px 6px;border-radius:9px;font-family:inherit;font-weight:700;font-size:14px;color:var(--ink-soft);cursor:pointer;transition:.15s}
  .tab[aria-selected="true"]{background:#fff;color:var(--ink);box-shadow:var(--shadow)}

  .dayhead{display:flex;align-items:center;gap:10px;margin:22px 2px 10px}
  .dayhead .d{font-family:"Anton",sans-serif;font-size:15px;letter-spacing:.12em;text-transform:uppercase;color:var(--pitch)}
  .dayhead .ln{flex:1;height:2px;background:var(--line);border-radius:2px}

  .match{background:#fff;border:2px solid var(--line);border-radius:var(--radius);padding:13px 14px;margin-bottom:11px;box-shadow:var(--shadow);position:relative}
  .match .meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
  .grp{font-size:11px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-soft)}
  .time{font-size:12px;font-weight:700;color:var(--ink-soft)} .time.closed{color:var(--red)}
  .row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px}
  .team{display:flex;align-items:center;gap:8px;min-width:0} .team.away{flex-direction:row-reverse;text-align:right}
  .flag{font-size:26px;line-height:1;flex-shrink:0}
  .tname{font-weight:700;font-size:15px;line-height:1.1;overflow:hidden;text-overflow:ellipsis}
  .score{display:flex;align-items:center;gap:7px}
  .score input{width:46px;height:52px;border:2px solid var(--line);border-radius:10px;background:var(--paper);text-align:center;font-family:"Anton",sans-serif;font-size:26px;color:var(--ink)}
  .score input:focus{outline:none;border-color:var(--celeste);background:#fff}
  .score input:disabled{background:var(--paper-2);color:var(--ink-soft)}
  .score .dash{font-family:"Anton",sans-serif;font-size:22px;color:var(--ink-soft)}

  .lb-block{margin-bottom:26px}
  .lb-title{display:flex;align-items:center;gap:8px;font-family:"Anton",sans-serif;font-size:22px;text-transform:uppercase;margin:0 2px 12px}
  .lb-title .dot{width:12px;height:12px;border-radius:50%}
  .lb-title.familia .dot{background:var(--celeste)} .lb-title.amigos .dot{background:var(--sun)}
  .podium{display:grid;grid-template-columns:1fr 1.1fr 1fr;gap:8px;align-items:end;margin:0 0 14px}
  .pod{background:#fff;border:2px solid var(--line);border-radius:14px;padding:14px 8px;text-align:center;box-shadow:var(--shadow)}
  .pod .medal{font-size:26px} .pod .nm{font-weight:800;font-size:14px;margin-top:4px;line-height:1.1;word-break:break-word}
  .pod .pt{font-family:"Anton",sans-serif;font-size:30px;line-height:1;margin-top:4px}
  .pod.first{border-color:var(--sun);transform:translateY(-6px)} .pod.first .pt{color:var(--sun)}
  .pod.second .pt{color:var(--celeste)} .pod.third .pt{color:var(--red)}
  .lb-row{display:grid;grid-template-columns:34px 1fr auto;gap:10px;align-items:center;background:#fff;border:2px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:8px;box-shadow:var(--shadow)}
  .lb-pos{font-family:"Anton",sans-serif;font-size:20px;color:var(--ink-soft);text-align:center}
  .lb-name{font-weight:700;font-size:15px} .lb-detail{font-size:11px;color:var(--ink-soft);font-weight:600}
  .lb-pts{font-family:"Anton",sans-serif;font-size:24px;color:var(--pitch)}
  .lb-pts small{font-family:"Outfit";font-size:11px;font-weight:700;color:var(--ink-soft)}
  .lb-empty{background:var(--paper-2);border:2px dashed var(--line);border-radius:12px;padding:18px;text-align:center;color:var(--ink-soft);font-weight:600;font-size:14px}

  .btn{border:none;border-radius:11px;padding:13px 16px;font-family:inherit;font-weight:800;font-size:15px;cursor:pointer;transition:.15s;width:100%}
  .btn-primary{background:var(--pitch);color:#fff;box-shadow:0 4px 12px rgba(21,121,63,.3)} .btn-primary:active{transform:translateY(1px)}
  .btn-ghost{background:#fff;color:var(--ink);border:2px solid var(--line)}
  .save-bar{position:sticky;bottom:14px;margin-top:18px;z-index:5}
  .empty{text-align:center;color:var(--ink-soft);padding:40px 20px;font-weight:600;line-height:1.5}
  .empty .big{font-family:"Anton",sans-serif;font-size:22px;color:var(--ink);display:block;margin-bottom:6px}
  .note{font-size:12px;color:var(--ink-soft);text-align:center;margin-top:14px;line-height:1.5}
  .secret{background:#fff;border:2px solid var(--line);border-left:5px solid var(--sun);border-radius:12px;padding:13px 15px;font-size:13px;font-weight:600;color:var(--ink-soft);line-height:1.5;margin-bottom:16px}
  .setup{background:#fff;border:2px solid var(--line);border-radius:16px;padding:22px;box-shadow:var(--shadow);line-height:1.6;font-size:14px}
  .setup h2{font-family:"Anton",sans-serif;font-size:24px;margin-bottom:10px}
  .setup ol{margin:10px 0 10px 20px} .setup li{margin-bottom:8px}
  .setup code{background:var(--paper-2);padding:2px 6px;border-radius:5px;font-size:13px}
  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:12px 20px;border-radius:999px;font-weight:700;font-size:14px;opacity:0;pointer-events:none;transition:.25s;z-index:50;box-shadow:0 8px 24px rgba(0,0,0,.25)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .addmatch{background:var(--paper-2);border:2px dashed var(--line);border-radius:14px;padding:14px;margin-top:8px}
  .addmatch summary{font-weight:800;cursor:pointer;color:var(--ink-soft);list-style:none} .addmatch summary::-webkit-details-marker{display:none}
  .addmatch .grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
  .addmatch input{border:2px solid var(--line);border-radius:9px;padding:9px 11px;font-family:inherit;font-size:14px;font-weight:600;background:#fff}
  .addmatch input:focus{outline:none;border-color:var(--celeste)} .addmatch .full{grid-column:1/-1}
  .spinner{text-align:center;padding:50px;color:var(--ink-soft);font-weight:700}
  @media (max-width:420px){.score input{width:40px;height:48px;font-size:22px}.tname{font-size:13px}.flag{font-size:22px}}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="eyebrow">Mundial 2026 · Festejo de cumple</div>
    <h1>Prode <span class="ball">⚽</span> Mundial</h1>
    <div class="subtitle">Hora de Argentina 🇦🇷 · 3 pts exacto, 1 pt ganador · hasta el viernes</div>
  </header>

  <div id="app" style="display:none">
    <div class="id-card">
      <div class="me">
        <label for="yo">Jugás como:</label>
        <input id="yo" type="text" placeholder="Tu nombre (ej: Tía Susana)" maxlength="24" autocomplete="off">
      </div>
      <div class="grp-toggle" id="grpToggle">
        <span class="gl">Tu equipo:</span>
        <button class="gbtn" data-g="familia" aria-pressed="false">👨‍👩‍👧‍👦 Familia</button>
        <button class="gbtn" data-g="amigos" aria-pressed="false">🎉 Amigos</button>
      </div>
    </div>
    <div class="orgbar">
      <span class="syncpill"><span class="syncdot" id="syncDot"></span><span id="syncTxt">Conectando…</span></span>
      <button class="orgbtn" id="orgBtn">🔒 Soy el organizador</button>
    </div>
    <div class="tabs" role="tablist" id="tabs"></div>
  </div>

  <div id="content"><div class="spinner">Cargando el prode…</div></div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* ===================================================================== */
/*  🔧  PEGÁ ACÁ TU CONFIG DE FIREBASE                                    */
/*  Firebase Console → ⚙ Configuración del proyecto → Tus apps → Web     */
/*  → "Configuración del SDK" → copiá el objeto firebaseConfig y pegalo   */
/* ===================================================================== */
const firebaseConfig = {
  apiKey: "AIzaSyBXy40oRMcbZGUPKWavW7kmzG0_aD_E5hI",
  authDomain: "prode-91c82.firebaseapp.com",
  projectId: "prode-91c82",
  storageBucket: "prode-91c82.firebasestorage.app",
  messagingSenderId: "935985988678",
  appId: "1:935985988678:web:67e648ec09cafc57ddb647"
};
/* ===================================================================== */

/* ---------- Fixture Mundial 2026 — hora ARGENTINA (UTC-3) · mar 16 a vie 19 ---------- */
const FLAGS={ARG:"🇦🇷",ALG:"🇩🇿",AUT:"🇦🇹",JOR:"🇯🇴",POR:"🇵🇹",COD:"🇨🇩",ENG:"🏴󠁧󠁢󠁥󠁮󠁧󠁿",CRO:"🇭🇷",GHA:"🇬🇭",PAN:"🇵🇦",UZB:"🇺🇿",COL:"🇨🇴",CZE:"🇨🇿",RSA:"🇿🇦",SUI:"🇨🇭",BIH:"🇧🇦",CAN:"🇨🇦",QAT:"🇶🇦",MEX:"🇲🇽",KOR:"🇰🇷",USA:"🇺🇸",AUS:"🇦🇺",SCO:"🏴󠁧󠁢󠁳󠁣󠁴󠁿",MAR:"🇲🇦",BRA:"🇧🇷",HAI:"🇭🇹",FRA:"🇫🇷",SEN:"🇸🇳",IRQ:"🇮🇶",NOR:"🇳🇴"};
const NAMES={ARG:"Argentina",ALG:"Argelia",AUT:"Austria",JOR:"Jordania",POR:"Portugal",COD:"RD Congo",ENG:"Inglaterra",CRO:"Croacia",GHA:"Ghana",PAN:"Panamá",UZB:"Uzbekistán",COL:"Colombia",CZE:"Chequia",RSA:"Sudáfrica",SUI:"Suiza",BIH:"Bosnia",CAN:"Canadá",QAT:"Qatar",MEX:"México",KOR:"Corea del Sur",USA:"EE. UU.",AUS:"Australia",SCO:"Escocia",MAR:"Marruecos",BRA:"Brasil",HAI:"Haití",FRA:"Francia",SEN:"Senegal",IRQ:"Irak",NOR:"Noruega"};
const FIXTURE=[
  {id:"m16f",dia:"2026-06-16",hora:"16:00",grupo:"I",l:"FRA",v:"SEN"},
  {id:"m16i",dia:"2026-06-16",hora:"19:00",grupo:"I",l:"IRQ",v:"NOR"},
  {id:"m16a",dia:"2026-06-16",hora:"22:00",grupo:"J",l:"ARG",v:"ALG"},
  {id:"m17a",dia:"2026-06-17",hora:"01:00",grupo:"J",l:"AUT",v:"JOR"},
  {id:"m17b",dia:"2026-06-17",hora:"14:00",grupo:"K",l:"POR",v:"COD"},
  {id:"m17c",dia:"2026-06-17",hora:"17:00",grupo:"L",l:"ENG",v:"CRO"},
  {id:"m17d",dia:"2026-06-17",hora:"20:00",grupo:"L",l:"GHA",v:"PAN"},
  {id:"m17e",dia:"2026-06-17",hora:"23:00",grupo:"K",l:"UZB",v:"COL"},
  {id:"m18a",dia:"2026-06-18",hora:"13:00",grupo:"A",l:"CZE",v:"RSA"},
  {id:"m18b",dia:"2026-06-18",hora:"16:00",grupo:"B",l:"SUI",v:"BIH"},
  {id:"m18c",dia:"2026-06-18",hora:"19:00",grupo:"B",l:"CAN",v:"QAT"},
  {id:"m18d",dia:"2026-06-18",hora:"22:00",grupo:"A",l:"MEX",v:"KOR"},
  {id:"m19a",dia:"2026-06-19",hora:"16:00",grupo:"D",l:"USA",v:"AUS"},
  {id:"m19b",dia:"2026-06-19",hora:"19:00",grupo:"C",l:"SCO",v:"MAR"},
  {id:"m19c",dia:"2026-06-19",hora:"21:30",grupo:"C",l:"BRA",v:"HAI"}
];
const GRUPOS={familia:{nombre:"Familia",emoji:"👨‍👩‍👧‍👦"},amigos:{nombre:"Amigos",emoji:"🎉"}};
const PT_EXACT=3,PT_SIGN=1;

/* ---------- Estado ---------- */
let view="pronos",fixture=FIXTURE.slice(),resultados={},todosPicks={},misPicks={};
let yo="",yoGrupo="",esOrganizador=false,pin=null;
let db=null, unsubPred=null, unsubAdmin=null;
const $=s=>document.querySelector(s);
const content=$("#content");

/* ---------- Personal (este dispositivo) ---------- */
const L={get:k=>{try{return localStorage.getItem(k);}catch(e){return null;}},set:(k,v)=>{try{localStorage.setItem(k,v);}catch(e){}}};

/* ---------- Arranque ---------- */
const sinConfig = !firebaseConfig.projectId || /PEGÁ|PEGA|TU_/.test(firebaseConfig.apiKey+"|"+firebaseConfig.projectId);
if(sinConfig){ mostrarSetup(); }
else { arrancar().catch(e=>{ console.error(e); content.innerHTML=`<div class="setup"><h2>Algo falló al conectar 😕</h2>Revisá que el <code>firebaseConfig</code> esté bien pegado y que tengas creada la base de datos <b>Firestore</b> en la consola de Firebase.<br><br><small>${esc(String(e.message||e))}</small></div>`; }); }

function mostrarSetup(){
  content.innerHTML=`<div class="setup">
    <h2>Falta conectar Firebase 🔌</h2>
    Esta app guarda todo en <b>tu</b> Firebase. Para activarla:
    <ol>
      <li>En <b>Firebase Console</b> → tu proyecto → <b>Firestore Database</b> → <b>Crear base de datos</b> (modo de prueba).</li>
      <li>⚙ <b>Configuración del proyecto</b> → <b>Tus apps</b> → ícono web <code>&lt;/&gt;</code> → copiá el objeto <code>firebaseConfig</code>.</li>
      <li>Abrí <code>index.html</code>, pegá ese objeto donde dice <b>"PEGÁ ACÁ TU CONFIG"</b> y guardá.</li>
      <li>Subí el archivo a tu repo de GitHub y activá <b>GitHub Pages</b>.</li>
    </ol>
    Cuando el config esté pegado, esta pantalla desaparece sola.
  </div>`;
}

async function arrancar(){
  const app=initializeApp(firebaseConfig);
  db=getFirestore(app);
  yo=L.get("prode_yo")||""; yoGrupo=L.get("prode_grupo")||""; esOrganizador=L.get("prode_admin")==="1";
  $("#app").style.display="block"; $("#yo").value=yo;
  pintarToggle(); bindStatic(); renderShell();
  // fixture + sembrado
  const cfgRef=doc(db,"prode","config");
  onSnapshot(cfgRef,snap=>{
    if(snap.exists()&&Array.isArray(snap.data().fixture)){ fixture=snap.data().fixture; }
    setSync(true); if(view==="pronos"||view==="result"||view==="tabla") render();
  },err=>{console.error(err);setSync(false);});
  const cur=await getDoc(cfgRef);
  if(!cur.exists()){ await setDoc(cfgRef,{fixture:FIXTURE}); }
  await loadMine();
  if(esOrganizador) suscribirOrganizador();
  render();
}

function setSync(ok){ const d=$("#syncDot"),t=$("#syncTxt"); if(!d)return; d.className="syncdot "+(ok?"ok":"err"); t.textContent=ok?"Sincronizado":"Sin conexión"; }

/* ---------- Identidad ---------- */
function slug(s){return s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]+/g,"_").replace(/^_+|_+$/g,"")||"x";}
function pintarToggle(){document.querySelectorAll(".gbtn").forEach(b=>b.setAttribute("aria-pressed",b.dataset.g===yoGrupo));}
async function loadMine(){
  misPicks={};
  if(!yo||!db) return;
  try{ const s=await getDoc(doc(db,"prode_pred",slug(yo))); if(s.exists()) misPicks=JSON.parse(JSON.stringify(s.data().picks||{})); }catch(e){}
}
function bindStatic(){
  const inp=$("#yo");
  inp.oninput=()=>{yo=inp.value.trim();};
  inp.onchange=async()=>{yo=inp.value.trim();L.set("prode_yo",yo);await loadMine();render();};
  document.querySelectorAll(".gbtn").forEach(b=>b.onclick=async()=>{
    yoGrupo=b.dataset.g;L.set("prode_grupo",yoGrupo);pintarToggle();
    if(yo){ try{const ref=doc(db,"prode_pred",slug(yo));const s=await getDoc(ref);if(s.exists())await setDoc(ref,{grupo:yoGrupo},{merge:true});}catch(e){} }
    if(view==="pronos")render();
  });
  $("#orgBtn").onclick=toggleOrganizador;
}

/* ---------- Modo organizador ---------- */
async function toggleOrganizador(){
  if(esOrganizador){ esOrganizador=false;L.set("prode_admin","0");desuscribirOrganizador();resultados={};todosPicks={};if(view!=="pronos")view="pronos";toast("Saliste del modo organizador");renderShell();render();return; }
  let adminData={};
  try{ const s=await getDoc(doc(db,"prode","admin")); if(s.exists())adminData=s.data(); }catch(e){}
  const pinGuardado=adminData.pin||null;
  if(!pinGuardado){
    const nuevo=prompt("Sos el organizador 👑\nCreá un PIN secreto (solo vos lo vas a saber). Con esto cargás resultados y ves las tablas:");
    if(nuevo==null||!nuevo.trim())return;
    await setDoc(doc(db,"prode","admin"),{pin:nuevo.trim()},{merge:true});
    esOrganizador=true;L.set("prode_admin","1");toast("Modo organizador activado 🔓");
  }else{
    const ingresa=prompt("PIN de organizador:");
    if(ingresa==null)return;
    if(ingresa.trim()===pinGuardado){esOrganizador=true;L.set("prode_admin","1");toast("Modo organizador activado 🔓");}
    else{toast("PIN incorrecto");return;}
  }
  suscribirOrganizador();renderShell();render();
}
function suscribirOrganizador(){
  if(unsubAdmin)return;
  unsubAdmin=onSnapshot(doc(db,"prode","admin"),s=>{ resultados=(s.exists()&&s.data().resultados)?s.data().resultados:{}; pin=s.exists()?(s.data().pin||null):null; if(esOrganizador&&(view==="result"||view==="tabla"))render(); });
  unsubPred=onSnapshot(collection(db,"prode_pred"),qs=>{ todosPicks={}; qs.forEach(d=>{const o=d.data();if(o&&o.jugador)todosPicks[d.id]=o;}); if(esOrganizador&&view==="tabla")render(); });
}
function desuscribirOrganizador(){ if(unsubAdmin){unsubAdmin();unsubAdmin=null;} if(unsubPred){unsubPred();unsubPred=null;} }

function renderShell(){
  const ob=$("#orgBtn"); ob.textContent=esOrganizador?"🔓 Organizador · salir":"🔒 Soy el organizador"; ob.classList.toggle("on",esOrganizador);
  const defs=esOrganizador?[["pronos","Mis pronósticos"],["tabla","Tablas"],["result","Resultados"]]:[["pronos","Mis pronósticos"]];
  if(!defs.some(d=>d[0]===view))view="pronos";
  const tabs=$("#tabs"); tabs.style.display=defs.length>1?"flex":"none";
  tabs.innerHTML=defs.map(d=>`<button class="tab" role="tab" data-view="${d[0]}" aria-selected="${d[0]===view}">${d[1]}</button>`).join("");
  tabs.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{view=t.dataset.view;tabs.querySelectorAll(".tab").forEach(x=>x.setAttribute("aria-selected",x===t));render();});
}

/* ---------- Fechas / cierre por horario ---------- */
const DIAS=["dom","lun","mar","mié","jue","vie","sáb"],MESES=["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
function fechaLarga(iso){const [y,m,d]=iso.split("-").map(Number);const dt=new Date(y,m-1,d);return `${DIAS[dt.getDay()]} ${d} ${MESES[m-1]}`;}
function ordenarFixture(){return [...fixture].sort((a,b)=>(a.dia+a.hora).localeCompare(b.dia+b.hora));}
function kickoffMs(m){const t=Date.parse(`${m.dia}T${(m.hora||"00:00")}:00-03:00`);return isNaN(t)?Infinity:t;}
function cerrado(m){return Date.now()>=kickoffMs(m);}

/* ---------- Render ---------- */
function render(){ if(!esOrganizador&&view!=="pronos")view="pronos"; if(view==="pronos")renderPronos(); else if(view==="tabla")renderTabla(); else renderResult(); }
function teamHTML(c,away=false){return `<div class="team ${away?'away':''}"><span class="flag">${FLAGS[c]||"🏳️"}</span><span class="tname">${NAMES[c]||c}</span></div>`;}
function dayHead(iso){return `<div class="dayhead"><span class="d">${fechaLarga(iso)}</span><span class="ln"></span></div>`;}

function renderPronos(){
  if(!yo){content.innerHTML=`<div class="empty"><span class="big">¡Hola! ¿Quién sos? 👋</span>Escribí tu nombre arriba y elegí si jugás con <b>Familia</b> o <b>Amigos</b> para empezar.</div>`;$("#yo").focus();return;}
  if(!yoGrupo){content.innerHTML=`<div class="empty"><span class="big">Elegí tu equipo 🪪</span>Tocá <b>Familia</b> o <b>Amigos</b> arriba así sabemos en qué tabla clasificás.</div>`;return;}
  const ordered=ordenarFixture();
  let html=`<div class="secret">🤫 Los resultados y la tabla los lleva el organizador en secreto. Vas a saber cómo te fue <b>al final</b>. Cuando un partido arranca, tu pronóstico queda cerrado.</div>`;
  let lastDay="";
  ordered.forEach(m=>{
    if(m.dia!==lastDay){lastDay=m.dia;html+=dayHead(m.dia);}
    const cl=cerrado(m),p=misPicks[m.id]||{};
    html+=`<div class="match"><div class="meta"><span class="grp">Grupo ${m.grupo}</span><span class="time ${cl?'closed':''}">${cl?'🔒 cerrado':'🕒 '+m.hora}</span></div><div class="row">${teamHTML(m.l)}<div class="score"><input inputmode="numeric" maxlength="2" data-m="${m.id}" data-s="l" value="${p.l??''}" ${cl?'disabled':''} aria-label="Goles ${NAMES[m.l]}"><span class="dash">–</span><input inputmode="numeric" maxlength="2" data-m="${m.id}" data-s="v" value="${p.v??''}" ${cl?'disabled':''} aria-label="Goles ${NAMES[m.v]}"></div>${teamHTML(m.v,true)}</div></div>`;
  });
  html+=`<div class="save-bar"><button class="btn btn-primary" id="guardar">Guardar mis pronósticos</button></div>`;
  html+=`<p class="note">Jugás como <b>${esc(yo)}</b> · equipo <b>${GRUPOS[yoGrupo].nombre}</b>.</p>`;
  content.innerHTML=html;
  content.querySelectorAll(".score input").forEach(i=>i.oninput=()=>{i.value=i.value.replace(/[^0-9]/g,"").slice(0,2);});
  $("#guardar").onclick=guardarPicks;
}
async function guardarPicks(){
  if(!yo){toast("Primero poné tu nombre");return;}
  if(!yoGrupo){toast("Elegí Familia o Amigos");return;}
  const picks=JSON.parse(JSON.stringify(misPicks));
  content.querySelectorAll(".score input").forEach(i=>{if(i.disabled)return;const id=i.dataset.m,s=i.dataset.s,v=i.value.trim();if(v!==""){picks[id]=picks[id]||{};picks[id][s]=parseInt(v,10);}else if(picks[id]){delete picks[id][s];}});
  Object.keys(picks).forEach(id=>{if(picks[id].l==null||picks[id].v==null)delete picks[id];});
  try{ await setDoc(doc(db,"prode_pred",slug(yo)),{jugador:yo,grupo:yoGrupo,picks,ts:Date.now()}); misPicks=JSON.parse(JSON.stringify(picks)); toast("¡Guardado! 🎯"); }
  catch(e){ console.error(e); toast("No se pudo guardar 😕"); }
}

/* ---------- Puntaje / tablas (organizador) ---------- */
function puntos(p,r){if(!p||!r||p.l==null||p.v==null)return 0;if(p.l===r.l&&p.v===r.v)return PT_EXACT;return Math.sign(p.l-p.v)===Math.sign(r.l-r.v)?PT_SIGN:0;}
function tablaDe(gk){
  const filas=Object.values(todosPicks).filter(o=>o.grupo===gk).map(o=>{
    let pts=0,ex=0,sg=0,jug=0;
    for(const id in resultados){const p=o.picks[id];if(!p||p.l==null||p.v==null)continue;jug++;const pp=puntos(p,resultados[id]);pts+=pp;if(pp===PT_EXACT)ex++;else if(pp===PT_SIGN)sg++;}
    return {jugador:o.jugador,pts,ex,sg,jug};
  });
  filas.sort((a,b)=>b.pts-a.pts||b.ex-a.ex||a.jugador.localeCompare(b.jugador));return filas;
}
function renderTabla(){
  const pj=Object.keys(resultados).length;
  let html=`<p class="note" style="margin:0 0 18px">👑 Vista de organizador · ${pj} partido${pj===1?'':'s'} con resultado cargado</p>`;
  html+=lbBlock("familia")+lbBlock("amigos");content.innerHTML=html;
}
function lbBlock(gk){
  const g=GRUPOS[gk],filas=tablaDe(gk);
  let html=`<div class="lb-block"><h2 class="lb-title ${gk}"><span class="dot"></span>${g.emoji} ${g.nombre}</h2>`;
  if(!filas.length){return html+`<div class="lb-empty">Todavía nadie del equipo ${g.nombre} cargó pronósticos.</div></div>`;}
  if(Object.keys(resultados).length>0&&filas.length>=2){
    const medals=["🥇","🥈","🥉"],cls=["first","second","third"],ord=[1,0,2];
    html+=`<div class="podium">`;
    ord.forEach(idx=>{const f=filas[idx];if(!f){html+=`<div></div>`;return;}html+=`<div class="pod ${cls[idx]}"><div class="medal">${medals[idx]}</div><div class="nm">${esc(f.jugador)}</div><div class="pt">${f.pts}</div></div>`;});
    html+=`</div>`+filas.slice(3).map((f,i)=>lbRow(f,i+3)).join("");
  }else html+=filas.map((f,i)=>lbRow(f,i)).join("");
  return html+`</div>`;
}
function lbRow(f,i){return `<div class="lb-row"><div class="lb-pos">${i+1}</div><div><div class="lb-name">${esc(f.jugador)}</div><div class="lb-detail">${f.ex} exacto${f.ex===1?'':'s'} · ${f.sg} ganador${f.sg===1?'':'es'} · ${f.jug} jugado${f.jug===1?'':'s'}</div></div><div class="lb-pts">${f.pts}<small> pts</small></div></div>`;}

/* ---------- Resultados (organizador) ---------- */
function renderResult(){
  const ordered=ordenarFixture();
  let html=`<p class="note" style="margin:0 0 14px">👑 Solo vos ves esto. Cargá el resultado real de cada partido; suma en las dos tablas y los jugadores no lo ven.</p>`;
  let lastDay="";
  ordered.forEach(m=>{
    if(m.dia!==lastDay){lastDay=m.dia;html+=dayHead(m.dia);}
    const r=resultados[m.id]||{};
    html+=`<div class="match"><div class="meta"><span class="grp">Grupo ${m.grupo}</span><span class="time">🕒 ${m.hora}</span></div><div class="row">${teamHTML(m.l)}<div class="score"><input inputmode="numeric" maxlength="2" data-m="${m.id}" data-s="l" value="${r.l??''}" aria-label="Goles ${NAMES[m.l]}"><span class="dash">–</span><input inputmode="numeric" maxlength="2" data-m="${m.id}" data-s="v" value="${r.v??''}" aria-label="Goles ${NAMES[m.v]}"></div>${teamHTML(m.v,true)}</div></div>`;
  });
  html+=`<details class="addmatch"><summary>➕ Agregar un partido</summary><div class="grid"><input id="nl" placeholder="Local (ej: ARG o Argentina)"><input id="nv" placeholder="Visitante (ej: BRA)"><input id="nd" type="date" value="2026-06-19"><input id="nh" placeholder="Hora ARG (ej: 16:00)" value="16:00"><input id="ng" class="full" placeholder="Etiqueta (ej: Grupo X)"><button class="btn btn-ghost full" id="addBtn">Agregar partido</button></div></details>`;
  html+=`<div class="save-bar"><button class="btn btn-primary" id="guardarRes">Guardar resultados</button></div>`;
  content.innerHTML=html;
  content.querySelectorAll(".score input").forEach(i=>i.oninput=()=>{i.value=i.value.replace(/[^0-9]/g,"").slice(0,2);});
  $("#guardarRes").onclick=guardarResultados;$("#addBtn").onclick=agregarPartido;
}
async function guardarResultados(){
  const nuevo={};
  content.querySelectorAll(".score input").forEach(i=>{const id=i.dataset.m,s=i.dataset.s,v=i.value.trim();if(v!==""){nuevo[id]=nuevo[id]||{};nuevo[id][s]=parseInt(v,10);}});
  Object.keys(nuevo).forEach(id=>{if(nuevo[id].l==null||nuevo[id].v==null)delete nuevo[id];});
  try{ await setDoc(doc(db,"prode","admin"),{resultados:nuevo},{merge:true}); resultados=nuevo; toast("Resultados guardados ✅"); render(); }
  catch(e){ console.error(e); toast("No se pudo guardar 😕"); }
}
function codeFrom(txt){txt=txt.trim();if(!txt)return null;const up=txt.toUpperCase();if(FLAGS[up])return up;const f=Object.keys(NAMES).find(k=>NAMES[k].toLowerCase()===txt.toLowerCase());if(f)return f;const code=up.replace(/[^A-Z]/g,"").slice(0,3)||"XX";if(!NAMES[code]){NAMES[code]=txt;FLAGS[code]="🏳️";}return code;}
async function agregarPartido(){
  const l=codeFrom($("#nl").value),v=codeFrom($("#nv").value),d=$("#nd").value,h=$("#nh").value.trim()||"16:00",g=$("#ng").value.trim()||"Extra";
  if(!l||!v){toast("Completá local y visitante");return;}
  fixture=[...fixture,{id:"x"+Date.now(),dia:d||"2026-06-19",hora:h,grupo:g,l,v}];
  try{ await setDoc(doc(db,"prode","config"),{fixture},{merge:true}); toast("Partido agregado ⚽"); render(); }catch(e){toast("No se pudo agregar 😕");}
}

/* ---------- Utils ---------- */
function esc(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
let toastT;function toast(m){const t=$("#toast");t.textContent=m;t.classList.add("show");clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove("show"),2200);}
</script>
</body>
</html>
